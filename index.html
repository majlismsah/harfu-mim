<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Kehadiran - KAJIAN HARFU MIM CIBODAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans min-h-screen flex items-center justify-center p-4 relative">

    <div id="loadingOverlay" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center text-white p-4">
        <div class="bg-white text-slate-800 p-6 rounded-2xl shadow-2xl flex flex-col items-center max-w-xs w-full text-center border border-slate-100 animate-bounce-short">
            <div class="inline-block w-12 h-12 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <h3 class="font-bold text-lg text-emerald-800 mb-1">Memproses Data...</h3>
            <p class="text-xs text-slate-500 leading-relaxed">Mohon tunggu sebentar, data Anda sedang disimpan ke server dan akan dialihkan ke WhatsApp Admin.</p>
        </div>
    </div>

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <div class="bg-gradient-to-br from-emerald-700 to-emerald-800 p-6 text-center text-white relative overflow-hidden rounded-t-2xl">
            <span class="text-[10px] font-bold tracking-widest uppercase bg-emerald-900/50 border border-emerald-500/30 px-3 py-1 rounded-full text-emerald-200 inline-block mb-3">
                🕌 Registrasi Kehadiran
            </span>
            <h1 class="text-xl font-black tracking-wide leading-tight">KAJIAN HARFU MIM CIBODAS</h1>
            
            <div class="mt-4 pt-3 border-t border-emerald-600/50 flex flex-col items-center justify-center gap-1 text-xs text-emerald-100">
                <div>🗓️ Sabtu & Minggu, 4 - 5 Juli 2026</div>
                <div>📍 <span class="font-bold text-white">Pondok Pemuda Cibodas</span></div>
            </div>
        </div>

        <form id="formPendaftaran" class="p-6 space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Nama Lengkap Jamaah</label>
                <input type="text" id="nama" required placeholder="MASUKKAN NAMA LENGKAP" 
                    oninput="this.value = this.value.toUpperCase()"
                    class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Nomor WhatsApp Aktif</label>
                <input type="tel" id="nowa" required placeholder="Contoh: 08123456789" 
                    class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Pilih Majlis</label>
                <select id="majlis" required class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-emerald-500 focus:outline-none">
                    <option value="" disabled selected>-- Silakan Pilih Majlis Anda --</option>
                    <option value="Ar-Rohman">Ar-Rohman</option>
                    <option value="Ar-Rohim">Ar-Rohim</option>
                    <option value="Al-Malik">Al-Malik</option>
                    <option value="Al-Quddus">Al-Quddus</option>
                    <option value="Nurul Hikmah">Nurul Hikmah</option>
                    <option value="Nurul Hakim">Nurul Hakim</option>
                    <option value="Nurul Salikin">Nurul Salikin</option>
                    <option value="Nurul Kamilah">Nurul Kamilah</option>
                    <option value="Kuningan">Kuningan</option>
                    <option value="RJ">RJ</option>
                    <option value="PADI">PADI</option>
                    <option value="Umum">Umum</option>
                </select>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-lg shadow-md text-sm transition-all">
                DAFTAR KEHADIRAN SEKARANG
            </button>
        </form>
    </div>

    <script>
        document.getElementById('formPendaftaran').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btnSubmit');
            const overlay = document.getElementById('loadingOverlay');
            
            // TAMPILKAN ANIMASI LOADING OVERLAY
            overlay.classList.remove('hidden');
            
            btn.innerText = "Memproses Pendaftaran...";
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            const namaClean = document.getElementById('nama').value.trim();
            let nowaRaw = document.getElementById('nowa').value.trim();
            const majlis = document.getElementById('majlis').value;

            // Merapikan nomor WA ke format 62
            let nowaClean = nowaRaw.replace(/[^0-9]/g, ''); 
            if (nowaClean.startsWith('0')) {
                nowaClean = '62' + nowaClean.slice(1);
            } else if (nowaClean.startsWith('8')) {
                nowaClean = '62' + nowaClean;
            }

            // URL WEB APP AKTIF SINKRON DENGAN GOOGLE SHEETS
            const urlAppsScript = "https://script.google.com/macros/s/AKfycbw9eTvCixystl0tyLa0CUftz65_Ld3fniQCqx0HSKFUxI2l6WiQtYVHA7tV7gbHbYgRUw/exec"; 
            const nomorAdmin = "62816787977"; 

            const formData = new URLSearchParams();
            formData.append('nama', namaClean);
            formData.append('nowa', nowaClean);
            formData.append('majlis', majlis);

            fetch(urlAppsScript, {
                method: 'POST',
                mode: 'no-cors', 
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData.toString()
            })
            .then(() => {
                // Beri jeda 0.5 detik agar animasi loading terlihat natural sebelum loncat ke WA
                setTimeout(function() {
                    const isiPesan = `Assalamu'alaikum Admin,%0A%0Asaya sudah mengisi data pendaftaran KAJIAN HARFU MIM CIBODAS.%0A%0A*Data Pendaftaran:*%0A• Nama: ${encodeURIComponent(namaClean)}%0A• No WA: ${encodeURIComponent(nowaClean)}%0A• Majlis: ${encodeURIComponent(majlis)}%0A%0AMohon di-follow up untuk link QR Code absensi dan lokasi acaranya. Terima kasih.`;
                    window.location.href = `https://wa.me/${nomorAdmin}?text=${isiPesan}`;
                }, 500);
            })
            .catch(error => {
                console.error('Error:', error);
                // Sembunyikan kembali loading jika internet putus/error
                overlay.classList.add('hidden');
                alert('Terjadi kesalahan jaringan, silakan coba lagi.');
                btn.innerText = "DAFTAR KEHADIRAN SEKARANG";
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            });
        });
    </script>
</body>
</html>
